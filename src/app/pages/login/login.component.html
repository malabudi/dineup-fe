<div class="form-container">
  <h1>Welcome Back</h1>

  <div [class.visible]="errorMessage" class="error-banner">
    {{ errorMessage }}
  </div>

  <form (ngSubmit)="onSubmit()">

    <app-input 
      id="email"
      type="email"
      name="email"
      placeholder="Email"
      [required]="true"
      label="Email"
      [value]="form.email"
      (valueChange)="form.email = $event"
    />

    <app-input 
      id="password"
      type="password"
      name="password"
      placeholder="Password"
      [required]="true"
      label="Password"
      [value]="form.password"
      (valueChange)="form.password = $event"
    />

    <app-button 
      label="Login"
      [loading]="loading" 
      type="submit"
      variant="primary"
      class="submit-button"
    />

  </form>

  <p class="sign-up">Don't have an account? <a routerLink="/register">Sign Up</a></p>
</div>
